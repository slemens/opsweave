name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Lint, TypeCheck & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build:shared

      - name: Lint
        run: npm run lint

      - name: TypeCheck
        run: npm run typecheck

      - name: Build frontend
        run: npm run build:frontend

      - name: Build backend
        run: npm run build:backend

  e2e:
    name: E2E Tests (Playwright)
    needs: check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build:shared

      - name: Build backend
        run: npm run build -w packages/backend

      - name: Build frontend
        run: npm run build -w packages/frontend

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: packages/frontend

      - name: Create database tables
        run: npx tsx packages/backend/src/db/setup.ts
        env:
          DB_DRIVER: sqlite
          DATABASE_URL: "file:${{ github.workspace }}/opsweave-test.db"

      - name: Seed demo data
        run: npx tsx packages/backend/src/db/seed/index.ts
        env:
          DB_DRIVER: sqlite
          DATABASE_URL: "file:${{ github.workspace }}/opsweave-test.db"

      - name: Start backend server
        run: node dist/server.js &
        working-directory: packages/backend
        env:
          NODE_ENV: test
          DB_DRIVER: sqlite
          DATABASE_URL: "file:${{ github.workspace }}/opsweave-test.db"
          QUEUE_DRIVER: better-queue
          JWT_SECRET: test-secret
          SESSION_SECRET: test-secret
          PORT: 3000

      - name: Wait for backend
        run: npx wait-on http://localhost:3000/api/v1/system/health --timeout 30000

      - name: Start frontend preview
        run: npm run preview -- --port 5173 &
        working-directory: packages/frontend

      - name: Wait for frontend
        run: npx wait-on http://localhost:5173 --timeout 30000

      - name: Run E2E tests
        run: npm run test:e2e
        working-directory: packages/frontend
        env:
          E2E_BASE_URL: http://localhost:5173

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: packages/frontend/playwright-report/
