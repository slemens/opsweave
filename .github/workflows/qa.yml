name: QA

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  qa:
    name: TypeCheck, Lint, Build & E2E
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: TypeCheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: packages/frontend

      - name: Start backend server
        run: npx tsx packages/backend/src/server.ts &
        env:
          NODE_ENV: test
          DB_DRIVER: sqlite
          QUEUE_DRIVER: better-queue
          JWT_SECRET: test-secret
          SESSION_SECRET: test-secret
          PORT: 3000

      - name: Start frontend dev server
        run: npm run dev --workspace=packages/frontend &

      - name: Wait for servers
        run: |
          echo "Waiting for backend..."
          timeout 60 bash -c 'until curl -sf http://localhost:3000/api/v1/system/health; do sleep 2; done'
          echo ""
          echo "Waiting for frontend..."
          timeout 60 bash -c 'until curl -sf http://localhost:5173; do sleep 2; done'

      - name: Run E2E tests
        run: npx playwright test
        working-directory: packages/frontend
        env:
          E2E_BASE_URL: http://localhost:5173

      - name: Upload test results
        uses: actions/upload-artifact@v5
        if: failure()
        with:
          name: playwright-report
          path: packages/frontend/playwright-report/
          retention-days: 14
