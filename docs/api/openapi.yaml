openapi: "3.0.3"
info:
  title: OpsWeave API
  version: "0.3.2"
  description: >-
    OpsWeave is a modular, asset-centric open-source IT Service Management system.
    It provides ITIL-conformant processes (Incident, Problem, Change), a CMDB,
    service catalogs, compliance mapping, and monitoring integration.
  license:
    name: AGPL-3.0
    url: https://www.gnu.org/licenses/agpl-3.0.html
  contact:
    name: OpsWeave
    url: https://github.com/slemens/opsweave

servers:
  - url: http://localhost:3000
    description: Local development server

tags:
  - name: Auth
  - name: Tenants
  - name: Users
  - name: Groups
  - name: Tickets
  - name: Assets
  - name: Workflows
  - name: Service Catalog
  - name: Compliance
  - name: Monitoring
  - name: SLA
  - name: Customers
  - name: Knowledge Base
  - name: Email
  - name: Portal
  - name: License
  - name: Settings
  - name: System
  - name: Email
  - name: Knowledge Base
  - name: Customer Portal
  - name: Settings
  - name: License
  - name: System

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: session
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - cookieAuth: []
  - bearerAuth: []

