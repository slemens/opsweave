<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="50%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#shine)"/>

  <!-- Hexagonal logo icon (centered, above text) -->
  <g transform="translate(560, 140) scale(3)">
    <circle cx="20" cy="20" r="3" fill="#ffffff"/>
    <circle cx="20" cy="7" r="2.5" fill="#ffffff"/>
    <circle cx="31.3" cy="13.5" r="2.5" fill="#ffffff"/>
    <circle cx="31.3" cy="26.5" r="2.5" fill="#ffffff"/>
    <circle cx="20" cy="33" r="2.5" fill="#ffffff"/>
    <circle cx="8.7" cy="26.5" r="2.5" fill="#ffffff"/>
    <circle cx="8.7" cy="13.5" r="2.5" fill="#ffffff"/>
    <line x1="20" y1="7" x2="31.3" y2="13.5" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.7"/>
    <line x1="31.3" y1="13.5" x2="31.3" y2="26.5" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.7"/>
    <line x1="31.3" y1="26.5" x2="20" y2="33" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.7"/>
    <line x1="20" y1="33" x2="8.7" y2="26.5" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.7"/>
    <line x1="8.7" y1="26.5" x2="8.7" y2="13.5" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.7"/>
    <line x1="8.7" y1="13.5" x2="20" y2="7" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.7"/>
    <line x1="20" y1="20" x2="20" y2="7" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.4"/>
    <line x1="20" y1="20" x2="31.3" y2="13.5" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.4"/>
    <line x1="20" y1="20" x2="31.3" y2="26.5" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.4"/>
    <line x1="20" y1="20" x2="20" y2="33" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.4"/>
    <line x1="20" y1="20" x2="8.7" y2="26.5" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.4"/>
    <line x1="20" y1="20" x2="8.7" y2="13.5" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.4"/>
  </g>

  <!-- Title -->
  <text x="600" y="410" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="72" font-weight="700" fill="#ffffff" letter-spacing="-1">OpsWeave</text>

  <!-- Subtitle -->
  <text x="600" y="470" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="24" font-weight="400" fill="#ffffff" fill-opacity="0.8">Weaving your IT operations together</text>

  <!-- Tagline -->
  <text x="600" y="520" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="18" font-weight="400" fill="#ffffff" fill-opacity="0.5">Asset-centric | Workflow-powered | Open Source ITSM</text>
</svg>
