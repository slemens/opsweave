<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpsWeave — Feedback Board</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #09090b; --card: #18181b; --card-hover: #1f1f23;
    --border: #27272a; --border-focus: #3b82f6;
    --text: #fafafa; --text-muted: #a1a1aa; --text-dim: #71717a;
    --accent: #3b82f6; --accent-hover: #2563eb;
    --red: #ef4444; --orange: #f97316; --green: #22c55e;
    --yellow: #eab308; --purple: #a855f7; --cyan: #06b6d4;
    --radius: 10px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    line-height: 1.6; min-height: 100vh;
  }

  .container { max-width: 860px; margin: 0 auto; padding: 2rem 1.5rem; }

  /* Header */
  .header { text-align: center; margin-bottom: 2.5rem; }
  .header svg { width: 40px; height: 40px; margin-bottom: 0.75rem; }
  .header h1 { font-size: 1.75rem; font-weight: 700; letter-spacing: -0.025em; }
  .header p { color: var(--text-muted); margin-top: 0.25rem; font-size: 0.95rem; }

  /* Form */
  .form-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 1.5rem; margin-bottom: 2rem;
  }
  .form-card h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 1rem; }

  .form-row { display: flex; gap: 0.75rem; margin-bottom: 0.75rem; }
  .form-row > * { flex: 1; }

  label { display: block; font-size: 0.8rem; font-weight: 500; color: var(--text-muted); margin-bottom: 0.3rem; }

  input, select, textarea {
    width: 100%; padding: 0.55rem 0.75rem;
    background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px;
    font-size: 0.9rem; font-family: inherit;
    transition: border-color 0.15s;
  }
  input:focus, select:focus, textarea:focus {
    outline: none; border-color: var(--border-focus);
    box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
  }
  textarea { resize: vertical; min-height: 80px; }

  .btn {
    display: inline-flex; align-items: center; gap: 0.5rem;
    padding: 0.55rem 1.25rem; border: none; border-radius: 6px;
    font-size: 0.9rem; font-weight: 500; cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Stats bar */
  .stats {
    display: flex; gap: 0.5rem; margin-bottom: 1.25rem; flex-wrap: wrap;
  }
  .stat-chip {
    font-size: 0.8rem; padding: 0.3rem 0.75rem; border-radius: 20px;
    border: 1px solid var(--border); color: var(--text-muted);
    cursor: pointer; transition: all 0.15s; user-select: none;
  }
  .stat-chip:hover { border-color: var(--text-dim); color: var(--text); }
  .stat-chip.active { border-color: var(--accent); color: var(--accent); background: rgba(59,130,246,0.1); }
  .stat-chip .count { font-weight: 600; color: var(--text); margin-left: 0.25rem; }
  .stat-chip.active .count { color: var(--accent); }

  /* Entry list */
  .entries { display: flex; flex-direction: column; gap: 0.5rem; }

  .entry {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 1rem 1.25rem;
    transition: border-color 0.15s, background 0.15s;
  }
  .entry:hover { border-color: var(--text-dim); background: var(--card-hover); }

  .entry-top { display: flex; align-items: flex-start; gap: 0.75rem; }

  .vote-btn {
    display: flex; flex-direction: column; align-items: center; gap: 0.1rem;
    background: none; border: 1px solid var(--border); border-radius: 6px;
    color: var(--text-muted); cursor: pointer; padding: 0.35rem 0.5rem;
    min-width: 42px; transition: all 0.15s; flex-shrink: 0;
  }
  .vote-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(59,130,246,0.05); }
  .vote-btn.voted { border-color: var(--accent); color: var(--accent); background: rgba(59,130,246,0.1); }
  .vote-btn svg { width: 14px; height: 14px; }
  .vote-count { font-size: 0.85rem; font-weight: 600; }

  .entry-content { flex: 1; min-width: 0; }
  .entry-title { font-weight: 600; font-size: 0.95rem; margin-bottom: 0.25rem; }
  .entry-desc { font-size: 0.85rem; color: var(--text-muted); white-space: pre-wrap; word-break: break-word; }
  .entry-meta { display: flex; align-items: center; gap: 0.75rem; margin-top: 0.5rem; flex-wrap: wrap; }
  .entry-meta span { font-size: 0.75rem; color: var(--text-dim); }

  .type-badge {
    display: inline-block; font-size: 0.7rem; font-weight: 600;
    padding: 0.15rem 0.5rem; border-radius: 4px; text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  .type-bug { background: rgba(239,68,68,0.15); color: var(--red); }
  .type-feature { background: rgba(168,85,247,0.15); color: var(--purple); }
  .type-improvement { background: rgba(6,182,212,0.15); color: var(--cyan); }
  .type-question { background: rgba(234,179,8,0.15); color: var(--yellow); }
  .type-feedback { background: rgba(34,197,94,0.15); color: var(--green); }

  .status-badge {
    display: inline-block; font-size: 0.65rem; font-weight: 500;
    padding: 0.1rem 0.4rem; border-radius: 3px;
  }
  .status-open { background: rgba(59,130,246,0.15); color: var(--accent); }
  .status-in_progress { background: rgba(249,115,22,0.15); color: var(--orange); }
  .status-done { background: rgba(34,197,94,0.15); color: var(--green); }
  .status-wont_fix { background: rgba(113,113,122,0.2); color: var(--text-dim); }

  .empty {
    text-align: center; padding: 3rem 1rem; color: var(--text-dim);
    border: 1px dashed var(--border); border-radius: var(--radius);
  }
  .empty svg { width: 48px; height: 48px; margin-bottom: 0.75rem; opacity: 0.4; }
  .empty h3 { font-size: 1rem; font-weight: 600; color: var(--text-muted); margin-bottom: 0.25rem; }

  .toast {
    position: fixed; bottom: 1.5rem; right: 1.5rem;
    background: var(--green); color: #000; font-weight: 500;
    padding: 0.75rem 1.25rem; border-radius: 8px; font-size: 0.9rem;
    transform: translateY(100px); opacity: 0; transition: all 0.3s;
    z-index: 100;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  @media (max-width: 600px) {
    .form-row { flex-direction: column; }
    .container { padding: 1rem; }
  }
</style>
</head>
<body>

<div class="container">
  <!-- Header -->
  <div class="header">
    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="45" stroke="#3b82f6" stroke-width="3"/>
      <circle cx="30" cy="35" r="6" fill="#3b82f6"/><circle cx="70" cy="35" r="6" fill="#3b82f6"/>
      <circle cx="50" cy="65" r="6" fill="#3b82f6"/><circle cx="25" cy="60" r="5" fill="#3b82f6" opacity=".6"/>
      <circle cx="75" cy="60" r="5" fill="#3b82f6" opacity=".6"/>
      <line x1="30" y1="35" x2="70" y2="35" stroke="#3b82f6" stroke-width="2" opacity=".5"/>
      <line x1="30" y1="35" x2="50" y2="65" stroke="#3b82f6" stroke-width="2" opacity=".5"/>
      <line x1="70" y1="35" x2="50" y2="65" stroke="#3b82f6" stroke-width="2" opacity=".5"/>
      <line x1="25" y1="60" x2="50" y2="65" stroke="#3b82f6" stroke-width="1.5" opacity=".3"/>
      <line x1="75" y1="60" x2="50" y2="65" stroke="#3b82f6" stroke-width="1.5" opacity=".3"/>
    </svg>
    <h1>OpsWeave Feedback Board</h1>
    <p>Bugs melden, Features vorschlagen, Feedback geben — alles willkommen!</p>
  </div>

  <!-- Form -->
  <div class="form-card">
    <h2>Neuer Eintrag</h2>
    <form id="feedbackForm">
      <div class="form-row">
        <div>
          <label for="authorName">Dein Name</label>
          <input type="text" id="authorName" placeholder="Max Mustermann" required>
        </div>
        <div>
          <label for="entryType">Typ</label>
          <select id="entryType">
            <option value="bug">Bug</option>
            <option value="feature">Feature-Wunsch</option>
            <option value="improvement">Verbesserung</option>
            <option value="question">Frage</option>
            <option value="feedback" selected>Allgemeines Feedback</option>
          </select>
        </div>
      </div>
      <div style="margin-bottom: 0.75rem;">
        <label for="title">Titel</label>
        <input type="text" id="title" placeholder="Kurze Zusammenfassung" required>
      </div>
      <div style="margin-bottom: 1rem;">
        <label for="description">Beschreibung (optional)</label>
        <textarea id="description" placeholder="Details, Schritte zum Reproduzieren, Screenshots-Links..."></textarea>
      </div>
      <button type="submit" class="btn btn-primary" id="submitBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Eintragen
      </button>
    </form>
  </div>

  <!-- Filter stats -->
  <div class="stats" id="stats"></div>

  <!-- Entries list -->
  <div class="entries" id="entries"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '/api/v1/feedback';
let entries = [];
let filter = 'all';
let votedIds = JSON.parse(localStorage.getItem('opsweave_feedback_votes') || '[]');

const typeLabels = {
  bug: 'Bug', feature: 'Feature', improvement: 'Verbesserung',
  question: 'Frage', feedback: 'Feedback'
};
const statusLabels = {
  open: 'Offen', in_progress: 'In Arbeit', done: 'Erledigt', wont_fix: "Won't Fix"
};

async function loadEntries() {
  try {
    const res = await fetch(API);
    const json = await res.json();
    entries = json.data || [];
    render();
  } catch (e) {
    document.getElementById('entries').innerHTML =
      '<div class="empty"><h3>Fehler beim Laden</h3><p>' + e.message + '</p></div>';
  }
}

function render() {
  renderStats();
  renderEntries();
}

function renderStats() {
  const counts = { all: entries.length };
  for (const e of entries) {
    counts[e.entry_type] = (counts[e.entry_type] || 0) + 1;
  }

  const el = document.getElementById('stats');
  let html = `<div class="stat-chip ${filter === 'all' ? 'active' : ''}" onclick="setFilter('all')">Alle<span class="count">${counts.all}</span></div>`;

  for (const [key, label] of Object.entries(typeLabels)) {
    if (counts[key]) {
      html += `<div class="stat-chip ${filter === key ? 'active' : ''}" onclick="setFilter('${key}')">${label}<span class="count">${counts[key]}</span></div>`;
    }
  }
  el.innerHTML = html;
}

function setFilter(f) {
  filter = f;
  render();
}

function renderEntries() {
  const filtered = filter === 'all' ? entries : entries.filter(e => e.entry_type === filter);
  const el = document.getElementById('entries');

  if (filtered.length === 0) {
    el.innerHTML = `<div class="empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="2"/></svg>
      <h3>Noch keine Einträge</h3>
      <p>Sei der Erste — trag dein Feedback oben ein!</p>
    </div>`;
    return;
  }

  el.innerHTML = filtered.map(e => {
    const voted = votedIds.includes(e.id);
    const ago = timeAgo(e.created_at);
    const desc = e.description ? `<div class="entry-desc">${escHtml(e.description)}</div>` : '';

    return `<div class="entry">
      <div class="entry-top">
        <button class="vote-btn ${voted ? 'voted' : ''}" onclick="doVote('${e.id}')" title="Upvote">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"/></svg>
          <span class="vote-count">${e.votes}</span>
        </button>
        <div class="entry-content">
          <div class="entry-title">${escHtml(e.title)}</div>
          ${desc}
          <div class="entry-meta">
            <span class="type-badge type-${e.entry_type}">${typeLabels[e.entry_type] || e.entry_type}</span>
            <span class="status-badge status-${e.status}">${statusLabels[e.status] || e.status}</span>
            <span>${escHtml(e.author_name)} &middot; ${ago}</span>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

async function doVote(id) {
  if (votedIds.includes(id)) return;
  try {
    await fetch(`${API}/${id}/vote`, { method: 'POST' });
    votedIds.push(id);
    localStorage.setItem('opsweave_feedback_votes', JSON.stringify(votedIds));
    const entry = entries.find(e => e.id === id);
    if (entry) entry.votes++;
    render();
  } catch {}
}

document.getElementById('feedbackForm').addEventListener('submit', async (ev) => {
  ev.preventDefault();
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;

  const body = {
    authorName: document.getElementById('authorName').value,
    entryType: document.getElementById('entryType').value,
    title: document.getElementById('title').value,
    description: document.getElementById('description').value,
  };

  try {
    const res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!res.ok) throw new Error('Fehler beim Speichern');

    document.getElementById('title').value = '';
    document.getElementById('description').value = '';
    showToast('Eintrag gespeichert!');
    await loadEntries();
  } catch (e) {
    showToast('Fehler: ' + e.message);
  } finally {
    btn.disabled = false;
  }
});

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function timeAgo(iso) {
  const diff = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'gerade eben';
  if (mins < 60) return `vor ${mins} Min.`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `vor ${hrs} Std.`;
  const days = Math.floor(hrs / 24);
  return `vor ${days} Tag${days > 1 ? 'en' : ''}`;
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

loadEntries();
</script>
</body>
</html>
